THROTTLE_SCRIPT="$HOME/.config/pacman/throttle.py"

if [ -f "$THROTTLE_SCRIPT" ]; then
    {
        read -r SCALED_CORES
        read -r PERCENT_LABEL
        read -r MATCHED_PATTERN
    } <<< "$("$THROTTLE_SCRIPT")"

    if [ -n "$SCALED_CORES" ]; then
        export MAKEFLAGS="-j${SCALED_CORES}"
        export NINJAFLAGS="-j${SCALED_CORES}"

        echo -e "\n\e[1;33m[!] Heavy package detected ($MATCHED_PATTERN). Throttling compilation to ${PERCENT_LABEL} capacity (-j${SCALED_CORES}).\e[0m\n"
    fi
fi
